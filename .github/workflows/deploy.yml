name: Deploy Frontend to SiteGround

on:
  push:
    branches:
      - frontend-api-integration  # TEMP: remove after testing
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build frontend ────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Deploy to SiteGround ──────────────────────────────
      - name: Copy frontend to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          source: "frontend/dist/*"
          target: "~/www/mymassrealestateagent.com/public_html/"
          strip_components: 2