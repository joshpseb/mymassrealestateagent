name: Deploy Full Stack to SiteGround

on:
  push:
    branches:
      - frontend-api-integration  # TEMP: remove after testing
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Frontend ──────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Backend ───────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── Deploy frontend static assets ────────────────────
      - name: Copy frontend to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          source: "frontend/dist/*"
          target: "~/www/mymassrealestateagent.com/public_html/"
          strip_components: 2

      # ── Deploy backend compiled files ─────────────────────
      - name: Copy backend to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          source: "backend/dist/*,backend/package.json"
          target: "~/www/mymassrealestateagent.com/backend/"
          strip_components: 1

      # ── Install production deps & restart on server ───────
      - name: Install deps and restart backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          script: |
            cd ~/www/mymassrealestateagent.com/backend
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt || true
            pm2 restart all 2>/dev/null || true
            pkill -f 'node dist/server.js' 2>/dev/null || true