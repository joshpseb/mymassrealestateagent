name: Deploy Full Stack to SiteGround

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Copy frontend built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          source: "frontend/dist/*"
          target: "~/www/mymassrealestateagent.com/public_html/"
          strip_components: 2

      - name: Copy backend built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          source: "backend/dist/*,backend/package.json,backend/package-lock.json"
          target: "~/www/mymassrealestateagent.com/backend/"
          strip_components: 1

      - name: Configure Production Backend & Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USER }}
          key: ${{ secrets.SITEGROUND_SSH_KEY }}
          port: 18765
          script: |
            cd ~/www/mymassrealestateagent.com/backend
            # Install production-only modules natively on SiteGround
            npm ci --production
            # Gracefully restart the backend server (Supports Phusion Passenger & PM2)
            mkdir -p tmp
            touch tmp/restart.txt || true
            pm2 restart all || true
            # Backup kill if process was hung, passenger will auto-restart on next HTTP request
            pkill -f 'node dist/server.js' || true
          script_stop: true